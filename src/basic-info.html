<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>FindIt | Basic Info</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous" />
    <link rel="stylesheet" href="./css/main.css" />
  </head>
  <body>
    <header class="container py-4">
      <h1 class="display-6 mb-2">Basic Info</h1>
      <nav class="d-flex flex-wrap gap-3">
        <a href="./index.html" class="link-body-emphasis fw-semibold">Guide</a>
        <a href="./basic-info.html" class="link-body-emphasis fw-semibold">Basic Info</a>
        <a href="./standard-images.html" class="link-body-emphasis fw-semibold">Standard Images</a>
        <a href="./user-images.html" class="link-body-emphasis fw-semibold">User Images</a>
        <a href="./web-images.html" class="link-body-emphasis fw-semibold">Web Images</a>
        <a href="./preview.html" class="link-body-emphasis fw-semibold">Preview</a>
      </nav>
      <p id="deck-status-line" class="text-muted mb-0">Current deck: (unsaved) (no changes yet)</p>
    </header>

    <main class="container pb-5">
      <section class="card shadow-sm mb-3">
        <div class="card-body">
          <label for="symbols-select" class="form-label">Pictures per card (n)</label>
          <select id="symbols-select" class="form-select w-auto" required>
            <option value="3">3</option>
            <option value="4">4</option>
            <option value="6">6</option>
            <option value="8">8</option>
            <option value="12">12</option>
          </select>
          <div class="form-text">Allowed values satisfy n-1 = p, where p is prime.</div>
        </div>
      </section>

      <section class="card shadow-sm mb-3">
        <div class="card-body">
          <h2 class="h5">Step 1 preview</h2>
          <div id="step-one-preview" class="step-one-preview"></div>
        </div>
      </section>

      <div class="d-flex justify-content-end">
        <a href="./standard-images.html" class="btn btn-primary">Next</a>
      </div>
    </main>

    <script type="module" src="./js/app/basicInfo.js"></script>
  </body>
</html>
