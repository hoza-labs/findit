<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>FindIt | Deck Builder</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous" />
    <link rel="stylesheet" href="./css/main.css" />
  </head>
  <body>
    <header class="container py-4">
      <h1 class="display-5 mb-2">Deck Builder</h1>
      <nav class="d-flex gap-3">
        <a href="./index.html" class="link-body-emphasis fw-semibold">Guide</a>
        <a href="./builder.html" class="link-body-emphasis fw-semibold">Deck Builder</a>
      </nav>
    </header>

    <main class="container pb-5">
      <section class="card shadow-sm mb-4">
        <div class="card-body">
          <form id="builder-form" class="row g-3 align-items-end">
            <div class="col-sm-6 col-lg-4">
              <label for="symbols-input" class="form-label">Symbols per card (n)</label>
              <input id="symbols-input" name="symbols" type="number" min="3" max="9" step="1" class="form-control" value="4" required />
              <div class="form-text">Deck size will be n² - n + 1 cards.</div>
            </div>
            <div class="col-sm-6 col-lg-8 d-flex gap-2 flex-wrap">
              <button type="submit" class="btn btn-primary">Generate Deck</button>
              <button id="save-button" type="button" class="btn btn-outline-primary">Save to Browser</button>
              <button id="load-button" type="button" class="btn btn-outline-secondary">Load Saved</button>
              <button id="export-button" type="button" class="btn btn-outline-dark">Export JSON</button>
              <button id="print-button" type="button" class="btn btn-outline-success">Print</button>
            </div>
          </form>
        </div>
      </section>

      <section class="card shadow-sm mb-3">
        <div class="card-body">
          <h2 class="h5">Deck summary</h2>
          <p id="deck-summary" class="mb-0 text-muted">No deck generated yet.</p>
        </div>
      </section>

      <section id="deck-output" class="deck-grid" aria-live="polite"></section>
    </main>

    <script type="module" src="./js/app/builder.js"></script>
  </body>
</html>
