<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>FindIt | Play!</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous" />
    <link rel="stylesheet" href="./css/main.css" />
  </head>
  <body class="has-top-bar">
    <nav class="top-next-bar navbar navbar-expand navbar-dark bg-primary fixed-top">
      <div class="container-fluid">
        <ul class="navbar-nav">
          <li class="nav-item">
            <a href="./index.html" class="nav-link fw-semibold">Home</a>
          </li>
        </ul>
        <ul class="navbar-nav ms-auto">
          <li class="nav-item">
            <a href="./save.html" class="nav-link fw-semibold">Next</a>
          </li>
        </ul>
      </div>
    </nav>

    <header class="container py-4">
      <h1 class="display-6 mb-2">Play!</h1>
      <nav class="d-flex flex-wrap gap-3">
        <a href="./index.html" class="link-body-emphasis fw-semibold">Home</a>
        <a href="./basic-info.html" class="link-body-emphasis fw-semibold">Basic Info</a>
        <a href="./standard-images.html" class="link-body-emphasis fw-semibold">Standard Images</a>
        <a href="./user-images.html" class="link-body-emphasis fw-semibold">User Images</a>
        <a href="./web-images.html" class="link-body-emphasis fw-semibold">Web Images</a>
        <a href="./preview.html" class="link-body-emphasis fw-semibold">Preview</a>
        <a href="./generate.html" class="link-body-emphasis fw-semibold">Play!</a>
        <a href="./save.html" class="link-body-emphasis fw-semibold">Save</a>
      </nav>
      <p id="deck-status-line" class="text-muted mb-0">Current deck: (new untitled deck) (no changes yet)</p>
    </header>

    <main class="container pb-5">
      <section class="card shadow-sm">
        <div class="card-body">
          <p>You can ‘play’ your deck right here in the browser. Review the options and click the button! 🙂</p>
          <form id="play-options-form" class="row g-3" novalidate>
            <div class="col-md-3">
              <label for="cards-to-show-min" class="form-label">Number of cards to show at once (minimum)</label>
              <input id="cards-to-show-min" name="cardsToShowMin" type="number" class="form-control" min="1" inputmode="numeric" />
            </div>
            <div class="col-md-3">
              <label for="cards-to-show-max" class="form-label">Number of cards to show at once (maximum)</label>
              <input id="cards-to-show-max" name="cardsToShowMax" type="number" class="form-control" min="1" inputmode="numeric" />
            </div>
            <div class="col-md-3">
              <label for="countdown-seconds" class="form-label">Countdown in seconds (blank for none)</label>
              <input id="countdown-seconds" name="countdownSeconds" type="number" class="form-control" min="1" inputmode="numeric" />
            </div>
            <div class="col-md-3">
              <label for="hands-to-play" class="form-label">Number of hands to play (blank for infinite)</label>
              <input id="hands-to-play" name="handsToPlay" type="number" class="form-control" min="1" inputmode="numeric" />
            </div>
            <div class="col-12">
              <label for="player-names" class="form-label">Player Names (comma separated)</label>
              <input id="player-names" name="playerNames" type="text" class="form-control" />
            </div>
            <div class="col-12 d-flex flex-wrap gap-2 align-items-center">
              <button id="play-button" type="button" class="btn btn-primary">Play!</button>
              <p id="play-options-message" class="mb-0 text-muted" aria-live="polite"></p>
            </div>
          </form>
        </div>
      </section>
    </main>

    <script type="module" src="./js/app/generate.js"></script>
  </body>
</html>
