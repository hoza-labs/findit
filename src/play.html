<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>FindIt | Play!</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous" />
    <link rel="stylesheet" href="./css/main.css" />
  </head>
  <body class="has-top-bar">
    <nav class="top-next-bar navbar navbar-expand navbar-dark bg-primary fixed-top">
      <div class="container-fluid">
        <div class="top-page-links">
          <a href="./index.html" class="nav-link fw-semibold">Home</a>
          <a href="./basic-info.html" class="nav-link fw-semibold">Basic Info</a>
          <a href="./standard-images.html" class="nav-link fw-semibold">Standard Images</a>
          <a href="./user-images.html" class="nav-link fw-semibold">User Images</a>
          <a href="./web-images.html" class="nav-link fw-semibold">Web Images</a>
          <a href="./preview.html" class="nav-link fw-semibold">Preview</a>
          <a href="./play.html" class="nav-link fw-semibold is-current" aria-current="page">Play!</a>
          <a href="./save.html" class="nav-link fw-semibold">Save</a>
        </div>
      </div>
    </nav>

    <header class="container py-4">
      <h1 class="display-6 mb-2">Play!</h1>
      <p id="deck-status-line" class="text-muted mb-0">Current deck: (new untitled deck) (no changes yet)</p>
    </header>

    <main class="container pb-5">
      <section class="card shadow-sm">
        <div class="card-body">
          <p>You can 'play' your deck right here in the browser. Review the options and click the button!</p>
          <form id="play-options-form" class="play-options-form" novalidate>
            <div class="play-options-row">
              <label for="cards-to-show-min" class="form-label mb-0">Number of cards to show at once (minimum)</label>
              <input id="cards-to-show-min" name="cardsToShowMin" type="number" class="form-control play-options-number-input" min="1" inputmode="numeric" />
            </div>
            <div class="play-options-row">
              <label for="cards-to-show-max" class="form-label mb-0">Number of cards to show at once (maximum)</label>
              <input id="cards-to-show-max" name="cardsToShowMax" type="number" class="form-control play-options-number-input" min="1" inputmode="numeric" />
            </div>
            <div class="play-options-row">
              <label for="countdown-seconds" class="form-label mb-0">Countdown in seconds (blank for none)</label>
              <input id="countdown-seconds" name="countdownSeconds" type="number" class="form-control play-options-number-input" min="1" inputmode="numeric" />
            </div>
            <div class="play-options-row play-options-row--split">
              <label for="length-of-play" class="form-label mb-0">Length of Play (blank for no limit)</label>
              <div class="play-options-split-controls">
                <input id="length-of-play" name="lengthOfPlay" type="number" class="form-control play-options-number-input" min="1" inputmode="numeric" />
                <label for="length-of-play-units" class="form-label mb-0">Units</label>
                <select id="length-of-play-units" name="lengthOfPlayUnits" class="form-select play-options-units-select">
                  <option value="hands">hands</option>
                  <option value="decks">decks</option>
                  <option value="minutes">minutes</option>
                </select>
              </div>
            </div>
            <div class="play-options-row play-options-row--text">
              <label for="player-names" class="form-label mb-0">Player Names (comma separated)</label>
              <input id="player-names" name="playerNames" type="text" class="form-control" />
            </div>
            <div class="d-flex flex-wrap gap-2 align-items-center pt-2">
              <button id="play-button" type="button" class="btn btn-primary">Play!</button>
              <p id="play-options-message" class="mb-0 text-muted" aria-live="polite"></p>
            </div>
          </form>
        </div>
      </section>
    </main>

    <script type="module" src="./js/app/generate.js"></script>
  </body>
</html>
