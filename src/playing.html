<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>FindIt | Playing</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous" />
    <link rel="stylesheet" href="./css/main.css" />
  </head>
  <body class="play-page">
    <main class="container-fluid py-4">
      <header class="play-header mb-4">
        <div>
          <h1 class="display-6 mb-1">Playing</h1>
          <p id="play-subtitle" class="text-muted mb-0"></p>
        </div>
        <div class="d-flex gap-2 flex-wrap">
          <button id="next-hand-button" type="button" class="btn btn-outline-primary">Next hand</button>
          <button id="restart-button" type="button" class="btn btn-primary">Restart</button>
        </div>
      </header>

      <section class="card shadow-sm mb-3">
        <div class="card-body">
          <div class="play-meta-grid">
            <div>
              <h2 class="h6 mb-1">Current hand</h2>
              <p id="hand-status" class="mb-0 text-muted"></p>
            </div>
            <div>
              <h2 class="h6 mb-1">Countdown</h2>
              <p id="countdown-status" class="mb-0 text-muted"></p>
            </div>
            <div>
              <h2 class="h6 mb-1">Players</h2>
              <p id="player-status" class="mb-0 text-muted"></p>
            </div>
          </div>
        </div>
      </section>

      <section class="play-board">
        <div id="play-board-empty" class="alert alert-warning" hidden></div>
        <div id="play-card-grid" class="play-card-grid"></div>
      </section>
    </main>

    <script type="module" src="./js/app/play.js"></script>
  </body>
</html>
