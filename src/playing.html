<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>FindIt | Playing</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous" />
    <link rel="stylesheet" href="./css/main.css" />
  </head>
  <body class="has-top-bar play-page">
    <nav class="top-next-bar navbar navbar-expand navbar-dark bg-primary fixed-top">
      <div class="container-fluid">
        <div class="top-page-links">
          <a href="./index.html" class="nav-link fw-semibold">Home</a>
          <a href="./basic-info.html" class="nav-link fw-semibold">Basic Info</a>
          <a href="./standard-images.html" class="nav-link fw-semibold">Standard Images</a>
          <a href="./user-images.html" class="nav-link fw-semibold">User Images</a>
          <a href="./web-images.html" class="nav-link fw-semibold">Web Images</a>
          <a href="./preview.html" class="nav-link fw-semibold">Preview</a>
          <a href="./play.html" class="nav-link fw-semibold is-current">Play!</a>
          <a href="./save.html" class="nav-link fw-semibold">Save</a>
        </div>
        <details class="top-page-menu-mobile">
          <summary aria-label="Open page navigation">
            <span class="top-page-menu-icon" aria-hidden="true"><span></span><span></span><span></span></span>
          </summary>
          <ul class="top-page-menu-list">
            <li><a href="./index.html" class="top-page-menu-link">Home</a></li>
            <li><a href="./basic-info.html" class="top-page-menu-link">Basic Info</a></li>
            <li><a href="./standard-images.html" class="top-page-menu-link">Standard Images</a></li>
            <li><a href="./user-images.html" class="top-page-menu-link">User Images</a></li>
            <li><a href="./web-images.html" class="top-page-menu-link">Web Images</a></li>
            <li><a href="./preview.html" class="top-page-menu-link">Preview</a></li>
            <li><a href="./play.html" class="top-page-menu-link">Play!</a></li>
            <li><a href="./save.html" class="top-page-menu-link">Save</a></li>
          </ul>
        </details>
        <div class="top-nav-step-links">
          <a href="./preview.html" class="btn btn-sm btn-outline-light">Prev</a>
          <a href="./save.html" class="btn btn-sm btn-light top-nav-next-link">Next</a>
        </div>
      </div>
    </nav>

    <main class="container-fluid preview-page-shell py-4">
      <header class="play-header mb-4">
        <div>
          <h1 class="display-6 mb-1">Playing</h1>
          <p id="play-subtitle" class="text-muted mb-0"></p>
        </div>
        <div class="d-flex gap-2 flex-wrap">
          <button id="results-button" type="button" class="btn btn-outline-secondary" hidden>Results</button>
          <button id="next-hand-button" type="button" class="btn btn-outline-primary">Next hand</button>
          <button id="restart-button" type="button" class="btn btn-primary">Restart</button>
        </div>
      </header>

      <section class="card shadow-sm mb-3">
        <div class="card-body">
          <div class="play-meta-grid">
            <div>
              <h2 class="h6 mb-1">Current hand</h2>
              <p id="hand-status" class="mb-0 text-muted"></p>
            </div>
            <div>
              <h2 class="h6 mb-1">Countdown</h2>
              <p id="countdown-status" class="mb-0 text-muted"></p>
            </div>
            <div>
              <h2 class="h6 mb-1">Players</h2>
              <p id="player-status" class="mb-0 text-muted"></p>
            </div>
          </div>
        </div>
      </section>

      <section class="play-board">
        <div id="play-board-empty" class="alert alert-warning" hidden></div>
        <div id="play-card-grid" class="play-card-grid"></div>
      </section>
    </main>

    <section id="claim-dialog" class="claim-dialog" hidden aria-live="polite">
      <div id="claim-dialog-header" class="claim-dialog-header">
        <div class="claim-dialog-title-row">
          <h2 class="h5 mb-0">Claim Hand</h2>
          <div class="claim-dialog-peek-wrap">
            <label for="claim-dialog-peek-slider" class="mb-0">Peek</label>
            <input id="claim-dialog-peek-slider" type="range" min="20" max="100" value="100" class="form-range mb-0" />
          </div>
        </div>
      </div>
      <div class="claim-dialog-body">
        <p id="claim-dialog-message" class="mb-3"></p>
        <div id="claim-player-list" class="claim-player-list"></div>
        <div class="claim-dialog-actions">
          <button id="claim-dialog-results-button" type="button" class="btn btn-outline-secondary me-auto" hidden>Results</button>
          <button id="claim-dialog-cancel-button" type="button" class="btn btn-outline-secondary">Cancel</button>
          <button id="claim-dialog-next-hand-button" type="button" class="btn btn-primary">Next hand</button>
        </div>
      </div>
    </section>

    <section id="confirmation-dialog" class="confirmation-dialog" hidden aria-live="polite">
      <div class="confirmation-dialog-body">
        <p id="confirmation-dialog-message" class="mb-3"></p>
        <div class="confirmation-dialog-actions">
          <button id="confirmation-dialog-change-options-button" type="button" class="btn btn-outline-secondary me-auto" hidden>Change options</button>
          <button id="confirmation-dialog-cancel-button" type="button" class="btn btn-outline-secondary">Cancel</button>
          <button id="confirmation-dialog-ok-button" type="button" class="btn btn-primary">OK</button>
        </div>
      </div>
    </section>

    <script type="module" src="./js/app/play.js"></script>
  </body>
</html>
