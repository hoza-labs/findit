<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>FindIt | Playing</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous" />
    <link rel="stylesheet" href="./css/main.css" />
  </head>
  <body class="has-top-bar play-page">
    <nav class="top-next-bar top-next-bar--playing navbar navbar-expand navbar-dark bg-primary fixed-top">
      <div class="container-fluid">
        <details class="top-page-menu-mobile">
          <summary aria-label="Open page navigation">
            <span class="top-page-menu-icon" aria-hidden="true"><span></span><span></span><span></span></span>
          </summary>
          <ul class="top-page-menu-list">
            <li><a href="./index.html" class="top-page-menu-link">Home</a></li>
            <li><a href="./basic-info.html" class="top-page-menu-link">Basic Info</a></li>
            <li><a href="./standard-images.html" class="top-page-menu-link">Standard Images</a></li>
            <li><a href="./user-images.html" class="top-page-menu-link">User Images</a></li>
            <li><a href="./web-images.html" class="top-page-menu-link">Web Images</a></li>
            <li><a href="./preview.html" class="top-page-menu-link">Preview</a></li>
            <li><a href="./play.html" class="top-page-menu-link">Play!</a></li>
            <li><a href="./save.html" class="top-page-menu-link">Save</a></li>
          </ul>
        </details>
        <div class="top-nav-play-summary">
          <p id="play-subtitle" class="mb-0"></p>
          <details id="play-info-menu" class="play-info-menu" hidden>
            <summary id="play-info-menu-summary" aria-label="Open game information">Game info</summary>
            <div class="play-info-menu-panel">
              <ul id="play-info-menu-list" class="play-info-menu-list mb-0"></ul>
            </div>
          </details>
        </div>
        <div class="top-nav-play-actions">
          <button id="results-button" type="button" class="btn btn-sm btn-outline-light" hidden>Results</button>
          <button id="next-hand-button" type="button" class="btn btn-sm btn-light">Next hand</button>
          <button id="restart-button" type="button" class="btn btn-sm btn-light">Restart</button>
        </div>
      </div>
    </nav>

    <main class="container-fluid preview-page-shell play-main-shell">
      <p id="play-status-line" class="play-status-line text-muted mb-0"></p>
      <p id="hand-status" class="visually-hidden" aria-hidden="true"></p>
      <p id="countdown-status" class="visually-hidden" aria-hidden="true"></p>
      <p id="player-status" class="visually-hidden" aria-hidden="true"></p>

      <section class="play-board">
        <div id="play-board-empty" class="alert alert-warning" hidden></div>
        <div id="play-card-grid" class="play-card-grid"></div>
      </section>
    </main>

    <section id="claim-dialog" class="claim-dialog" hidden aria-live="polite">
      <div id="claim-dialog-header" class="claim-dialog-header">
        <div class="claim-dialog-title-row">
          <h2 class="h5 mb-0">Claim Hand</h2>
          <div class="claim-dialog-peek-wrap">
            <button id="claim-dialog-peek-button" type="button" class="btn btn-sm btn-outline-secondary">Peek</button>
          </div>
        </div>
      </div>
      <div class="claim-dialog-body">
        <p id="claim-dialog-message" class="mb-3"></p>
        <div id="claim-player-list" class="claim-player-list"></div>
        <div class="claim-dialog-actions">
          <button id="claim-dialog-results-button" type="button" class="btn btn-outline-secondary me-auto" hidden>Results</button>
          <button id="claim-dialog-cancel-button" type="button" class="btn btn-outline-secondary">Cancel</button>
          <button id="claim-dialog-next-hand-button" type="button" class="btn btn-primary">Next hand</button>
        </div>
      </div>
    </section>

    <section id="confirmation-dialog" class="confirmation-dialog" hidden aria-live="polite">
      <div class="confirmation-dialog-body">
        <p id="confirmation-dialog-message" class="mb-3"></p>
        <div class="confirmation-dialog-actions">
          <button id="confirmation-dialog-change-options-button" type="button" class="btn btn-outline-secondary me-auto" hidden>Change options</button>
          <button id="confirmation-dialog-cancel-button" type="button" class="btn btn-outline-secondary">Cancel</button>
          <button id="confirmation-dialog-ok-button" type="button" class="btn btn-primary">OK</button>
        </div>
      </div>
    </section>

    <script type="module" src="./js/app/play.js"></script>
  </body>
</html>
