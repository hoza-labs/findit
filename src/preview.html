<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>FindIt | Preview</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous" />
    <link rel="stylesheet" href="./css/main.css" />
  </head>
  <body class="has-top-bar">
    <nav class="top-next-bar navbar navbar-expand navbar-dark bg-primary fixed-top">
      <div class="container-fluid">
        <ul class="navbar-nav">
          <li class="nav-item">
            <a href="./index.html" class="nav-link fw-semibold">Home</a>
          </li>
        </ul>
        <ul class="navbar-nav ms-auto"></ul>
      </div>
    </nav>

    <header class="container py-4">
      <h1 class="display-6 mb-2">Preview</h1>
      <nav class="d-flex flex-wrap gap-3">
        <a href="./index.html" class="link-body-emphasis fw-semibold">Home</a>
        <a href="./basic-info.html" class="link-body-emphasis fw-semibold">Basic Info</a>
        <a href="./standard-images.html" class="link-body-emphasis fw-semibold">Standard Images</a>
        <a href="./user-images.html" class="link-body-emphasis fw-semibold">User Images</a>
        <a href="./web-images.html" class="link-body-emphasis fw-semibold">Web Images</a>
        <a href="./preview.html" class="link-body-emphasis fw-semibold">Preview</a>
      </nav>
      <p id="deck-status-line" class="text-muted mb-0">Current deck: (new untitled deck) (no changes yet)</p>
    </header>

    <main class="container pb-5">
      <section class="card shadow-sm mb-3">
        <div class="card-body d-flex flex-wrap gap-2 align-items-center justify-content-between">
          <div>
            <h2 class="h5 mb-1">Deck Preview</h2>
            <p id="deck-summary" class="mb-0 text-muted"></p>
          </div>
          <div class="d-flex gap-2">
            <button id="save-button" type="button" class="btn btn-outline-primary" disabled>Save</button>
            <button id="save-as-button" type="button" class="btn btn-primary">Save as...</button>
          </div>
        </div>
      </section>

      <section class="card shadow-sm mb-3">
        <div class="card-body">
          <div class="preview-main-layout">
            <section>
              <div id="deck-pattern" class="deck-pattern"></div>
            </section>
            <section>
              <h3 class="h6 mb-2">Sample Card</h3>
              <div id="preview-sample-card-target" class="sample-card-target"></div>
              <div class="mt-2">
                <button id="refresh-sample-button" type="button" class="btn btn-outline-primary btn-sm">Refresh</button>
              </div>
            </section>
          </div>
          <section id="extra-images-section" class="mt-4" hidden>
            <h3 class="h6 mb-2">Extra images not included in the deck</h3>
            <div id="selected-images" class="image-library-grid image-library-grid--page"></div>
          </section>
        </div>
      </section>
    </main>

    <dialog id="save-as-dialog" class="save-as-dialog">
      <form method="dialog" id="save-as-form">
        <h2 class="h5 mb-2">Save deck as...</h2>
        <label for="save-as-name" class="form-label">Deck name</label>
        <input id="save-as-name" class="form-control mb-2" type="text" required />
        <p class="mb-2 text-muted">Existing deck names (click to replace):</p>
        <div id="existing-deck-names" class="existing-decks mb-3"></div>
        <div class="d-flex gap-2 justify-content-end">
          <button type="button" id="save-as-cancel" class="btn btn-outline-secondary">Cancel</button>
          <button type="submit" class="btn btn-primary">Save</button>
        </div>
      </form>
    </dialog>

    <script type="module" src="./js/app/preview.js"></script>
  </body>
</html>
