    <nav class="top-next-bar navbar navbar-expand navbar-dark bg-primary fixed-top">
      <div class="container-fluid">
        <div class="top-page-links">
          <a href="./index.html" class="nav-link fw-semibold">Home</a>
          <a href="./basic-info.html" class="nav-link fw-semibold">Basic Info</a>
          <a href="./standard-images.html" class="nav-link fw-semibold" data-select-images-link>Select Images</a>
          <a href="./preview.html" class="nav-link fw-semibold">Preview</a>

          <a href="./save.html" class="nav-link fw-semibold is-current" aria-current="page">Save&hellip;</a>
        </div>
        <details class="top-page-menu-mobile">
          <summary aria-label="Open page navigation">
            <span class="top-page-menu-icon" aria-hidden="true"><span></span><span></span><span></span></span>
          </summary>
          <ul class="top-page-menu-list">
            <li><a href="./index.html" class="top-page-menu-link">Home</a></li>
            <li><a href="./basic-info.html" class="top-page-menu-link">Basic Info</a></li>
            <li><a href="./standard-images.html" class="top-page-menu-link" data-select-images-link>Select Images</a></li>
            <li><a href="./preview.html" class="top-page-menu-link">Preview</a></li>
            <li><a href="./play.html" class="top-page-menu-link">Play!</a></li>
            <li><a href="./save.html" class="top-page-menu-link" aria-current="page">Save&hellip;</a></li>

    <header class="container-fluid preview-page-shell py-4">
      <h1 class="display-6 mb-2">Save</h1>
      <p class="mb-2">Save your deck to browser storage.</p>
      <p id="deck-status-line" class="text-muted mb-0">Current deck: (new untitled deck) (no changes yet)</p>
    </header>

    <main class="container-fluid preview-page-shell pb-5">
      <section class="card shadow-sm mb-3">
        <div class="card-body d-flex flex-wrap gap-2 align-items-center justify-content-between">
          <div>
            <h2 class="h5 mb-1">Save Deck</h2>
            <p id="deck-summary" class="mb-0 text-muted"></p>
          </div>
          <div class="d-flex gap-2">
            <button id="save-button" type="button" class="btn btn-outline-primary" disabled>Save</button>
            <button id="save-as-button" type="button" class="btn btn-primary">Save as...</button>
          </div>
        </div>
      </section>

      <section class="card shadow-sm">
        <div class="card-body">
          <div id="save-page-empty" class="alert alert-warning" hidden></div>
          <div id="deck-cards" class="save-deck-grid"></div>
        </div>
      </section>
    </main>

    <dialog id="save-as-dialog" class="save-as-dialog">
      <form method="dialog" id="save-as-form">
        <h2 class="h5 mb-2">Save deck as...</h2>
        <label for="save-as-name" class="form-label">Deck name</label>
        <input id="save-as-name" class="form-control mb-2" type="text" required />
        <p class="mb-2 text-muted">Existing deck names (click to replace):</p>
        <div id="existing-deck-names" class="existing-decks mb-3"></div>
        <div class="d-flex gap-2 justify-content-end">
          <button type="button" id="save-as-cancel" class="btn btn-outline-secondary">Cancel</button>
          <button type="submit" class="btn btn-primary">Save</button>
        </div>
      </form>
    </dialog>

    <script type="module" src="./js/app/save.js"></script>
    <script type="module" src="./js/app/selectImagesNav.js"></script>
    <script type="module" src="./js/app/menuDismiss.js"></script>
  </body>
</html>
