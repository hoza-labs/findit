<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>FindIt | User Images</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous" />
    <link rel="stylesheet" href="./css/main.css" />
  </head>
  <body class="has-top-bar">
    <nav class="top-next-bar navbar navbar-expand navbar-dark bg-primary fixed-top">
      <div class="container-fluid">
        <ul class="navbar-nav">
          <li class="nav-item">
            <a href="./index.html" class="nav-link fw-semibold">Home</a>
          </li>
        </ul>
        <ul class="navbar-nav ms-auto">
          <li class="nav-item">
            <a href="./web-images.html" class="nav-link fw-semibold">Next</a>
          </li>
        </ul>
      </div>
    </nav>

    <header class="container py-4">
      <h1 class="display-6 mb-2">User Images</h1>
      <nav class="d-flex flex-wrap gap-3">
        <a href="./index.html" class="link-body-emphasis fw-semibold">Home</a>
        <a href="./basic-info.html" class="link-body-emphasis fw-semibold">Basic Info</a>
        <a href="./standard-images.html" class="link-body-emphasis fw-semibold">Standard Images</a>
        <a href="./user-images.html" class="link-body-emphasis fw-semibold">User Images</a>
        <a href="./web-images.html" class="link-body-emphasis fw-semibold">Web Images</a>
        <a href="./preview.html" class="link-body-emphasis fw-semibold">Preview</a>
        <a href="./generate.html" class="link-body-emphasis fw-semibold">Generate</a>
      </nav>
      <p id="deck-status-line" class="text-muted mb-0">Current deck: (new untitled deck) (no changes yet)</p>
    </header>

    <main class="container pb-5">
      <section class="mb-3">
        <form id="upload-images-form" class="mb-3">
          <label for="image-upload-input" class="form-label">Upload image files</label>
          <input id="image-upload-input" type="file" accept="image/*" class="form-control" multiple />
        </form>
        <div id="user-images" class="image-library-grid image-library-grid--page"></div>
      </section>
    </main>

    <dialog id="rename-image-dialog" class="save-as-dialog">
      <form method="dialog" id="rename-image-form">
        <h2 class="h5 mb-2">Rename image</h2>
        <label for="rename-image-input" class="form-label">New name</label>
        <input id="rename-image-input" class="form-control mb-3" type="text" required />
        <div class="d-flex gap-2 justify-content-end">
          <button id="rename-image-cancel" type="button" class="btn btn-outline-secondary">Cancel</button>
          <button type="submit" class="btn btn-primary">OK</button>
        </div>
      </form>
    </dialog>

    <dialog id="delete-image-dialog" class="save-as-dialog">
      <form method="dialog" id="delete-image-form">
        <h2 class="h5 mb-2">Delete image</h2>
        <p class="mb-3">Are you sure you want to remove this image from FindIt? This action cannot be undone.</p>
        <div class="d-flex gap-2 justify-content-end">
          <button id="delete-image-cancel" type="button" class="btn btn-outline-secondary">Cancel</button>
          <button type="submit" class="btn btn-danger">OK</button>
        </div>
      </form>
    </dialog>

    <script type="module" src="./js/app/userImages.js"></script>
  </body>
</html>
