<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>FindIt | Web Images</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous" />
    <link rel="stylesheet" href="./css/main.css" />
  </head>
  <body>
    <header class="container py-4">
      <h1 class="display-6 mb-2">Web Images</h1>
      <nav class="d-flex flex-wrap gap-3">
        <a href="./index.html" class="link-body-emphasis fw-semibold">Guide</a>
        <a href="./basic-info.html" class="link-body-emphasis fw-semibold">Basic Info</a>
        <a href="./standard-images.html" class="link-body-emphasis fw-semibold">Standard Images</a>
        <a href="./user-images.html" class="link-body-emphasis fw-semibold">User Images</a>
        <a href="./web-images.html" class="link-body-emphasis fw-semibold">Web Images</a>
        <a href="./preview.html" class="link-body-emphasis fw-semibold">Preview</a>
      </nav>
      <p id="deck-status-line" class="text-muted mb-0">Current deck: (unsaved) (no changes yet)</p>
    </header>

    <main class="container pb-5">
      <section class="card shadow-sm mb-3">
        <div class="card-body">
          <form id="web-image-form" class="row g-2 mb-3">
            <div class="col-sm-6">
              <label for="web-image-url" class="form-label">Image URL</label>
              <input id="web-image-url" type="url" class="form-control" placeholder="https://example.com/image.png" required />
            </div>
            <div class="col-sm-4">
              <label for="web-image-name" class="form-label">Name (optional)</label>
              <input id="web-image-name" type="text" class="form-control" placeholder="My image name" />
            </div>
            <div class="col-sm-2 d-flex align-items-end">
              <button type="submit" class="btn btn-outline-primary w-100">Add</button>
            </div>
          </form>
          <div id="web-images" class="image-library-grid"></div>
        </div>
      </section>

      <div class="d-flex justify-content-end">
        <a href="./preview.html" class="btn btn-primary">Next</a>
      </div>
    </main>

    <script type="module" src="./js/app/webImages.js"></script>
  </body>
</html>
